<section class="avatar">
    @if (showUser() && user()) {
        <okd-avatar
            [avatarCode]="user()!.avatar"
            [seed]="user()!.hashId"
            [size]="2.5"
            sizeUnit="em"
        />
    }
</section>

<section class="message">
    @if (showUser()) {
        <div class="name">{{ user()?.name ?? '...' }}</div>
    }
    <div class="text">{{ message().content }}</div>
</section>
