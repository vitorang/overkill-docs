<okd-main-header></okd-main-header>

<div class="page-content">
    <okd-request-overlay [requestHandler]="profileHandler" (retry)="loadProfile()">
        <mat-card>
            <mat-card-header>
                <h2>Meu Perfil</h2>
            </mat-card-header>
            <mat-card-content>
                <okd-profile-form [value]="profile()" (saved)="onProfileSaved($event)"/>
            </mat-card-content>
        </mat-card>
    </okd-request-overlay>

    <mat-card>
        <mat-card-header>
            <h2>Segurança</h2>
        </mat-card-header>

        <mat-card-content>
            <h3>Alterar senha</h3>
            <okd-password-change-form (saved)="alertSuccess()"/>
        </mat-card-content>
    </mat-card>
    
    <okd-request-overlay [requestHandler]="sessionsHandler" (retry)="loadSessions()">
        <mat-card>
            <mat-card-header>
                <h2>Sessões ativas</h2>
            </mat-card-header>
            <mat-card-content>
                <div class="session-list">
                    @for (session of sessions(); track session.hashId) {
                        <div class="session-item">
                            <div class="device-icon">
                                 <mat-icon>{{session.deviceIcon}}</mat-icon>
                            </div>
                            <div class="device-name">
                                {{ session.browserName }}
                            </div>
                            <div class="actions">
                                @if (session.isCurrent) {
                                    <button mat-button disabled>Atual</button>
                                } @else {
                                    <button mat-button (click)="logout(session)">Sair</button>
                                }
                            </div>
                        </div>
                    }
                </div>          
            </mat-card-content>
        </mat-card>
    </okd-request-overlay>
</div>
