<div class="child-content" [class.is-locked]="locked()">
    <ng-content />
</div>

@if (locked()) {
    <div class="overlay-content">
        @if (requestHandler().loading()) {
            <mat-spinner />
        }

        @if (requestHandler().error()) {
            <p>Ocorreu um erro, tente novamente</p>
            <button mat-flat-button (click)="retry.emit()">Ok</button>
        }
    </div>
}
