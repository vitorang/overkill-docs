services:
  proxy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - overkill-network

  api:
    image: overkilldocsapi
    build:
      context: .
      dockerfile: OverkillDocs.Api/Dockerfile
    environment:
      - ConnectionStrings__SqlServer=Server=${SQL_SERVER};Database=${SQL_DB};User Id=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Sqlite=Data Source=/home/data/database.sqlite
      - FeatureFlags__UseRedis=${USE_REDIS}
      - FeatureFlags__UseSqlite=${USE_SQLITE}
      - Hashids__Salt=${HASHIDS_SALT}
    ports:
      - "8080:8080"
    networks:
      - overkill-network
    volumes:
      - sqlite_data:/home/data
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build: ./OverkillDocs.Web
    networks:
      - overkill-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    volumes:
      - sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - overkill-network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-U", "${SQL_USER}", "-P", "${SQL_PASSWORD}", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  migrator:
    build:
      context: .
      dockerfile: OverkillDocs.Migrator/Dockerfile
    environment:
      - ConnectionStrings__SqlServer=Server=${SQL_SERVER};Database=${SQL_DB};User Id=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Sqlite=Data Source=/home/data/database.sqlite
      - FeatureFlags__UseSqlite=${USE_SQLITE}
    networks:
      - overkill-network
    volumes:
      - sqlite_data:/home/data
    depends_on:
      sqlserver:
        condition: service_healthy

  redis:
    image: redis:alpine
    networks:
      - overkill-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  overkill-network:
    driver: bridge

volumes:
  caddy_data:
  sqlserver_data:
  sqlite_data:
