services:
  proxy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - overkill-network

  api:
    image: overkilldocsapi
    build:
      context: .
      dockerfile: OverkillDocs.Api/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - overkill-network
    volumes:
      - sqlite_data:/home/data
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
        required: false

  web:
    build: ./OverkillDocs.Web
    networks:
      - overkill-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles:
      - sqlserver
    volumes:
      - sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD
    ports:
      - "1433:1433"
    networks:
      - overkill-network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  migrator:
    build:
      context: .
      dockerfile: OverkillDocs.Migrator/Dockerfile
    env_file:
      - .env
    networks:
      - overkill-network
    volumes:
      - sqlite_data:/home/data
    depends_on:
      sqlserver:
        condition: service_healthy
        required: false

  redis:
    image: redis:alpine
    profiles:
      - redis
    networks:
      - overkill-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  overkill-network:
    driver: bridge

volumes:
  caddy_data:
  sqlserver_data:
  sqlite_data:
