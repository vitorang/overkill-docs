name: OverkillDocs Docker CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Start E2E Infrastructure
        run: |
          docker compose -f docker-compose.e2e.yml --env-file .env.e2e up -d --build

      - name: Install Playwright Browsers
        run: |
          dotnet build OverkillDocs.sln --configuration Release
          npx playwright install --with-deps

      - name: Run Integration Tests
        run: dotnet test OverkillDocs.Tests.Integration/OverkillDocs.Tests.Integration.csproj --configuration Release --no-build --verbosity normal

      - name: Run E2E Tests
        run: dotnet test OverkillDocs.Tests.E2E/OverkillDocs.Tests.E2E.csproj --configuration Release --no-build --verbosity normal

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-results
          path: '**/test-results/'
          retention-days: 1

      - name: List files for debug
        if: failure()
        run: ls -R test-results/

      - name: Stop E2E Infrastructure
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build the Docker image
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          VERSION="v${{ github.run_number }}"
          docker build . --file Dockerfile.prod --tag "overkill-docs:${VERSION}-${SHA}" --tag "overkill-docs:latest"

      - name: Render Deploy
        run: curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}
